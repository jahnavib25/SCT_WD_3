<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Gradients -->
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.2)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Container -->
  <rect width="100" height="100" rx="24" fill="#0c0f1d" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2"/>
  
  <!-- Grid Lines -->
  <line x1="36" y1="18" x2="36" y2="82" stroke="url(#grid-grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="18" x2="64" y2="82" stroke="url(#grid-grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="36" x2="82" y2="36" stroke="url(#grid-grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="64" x2="82" y2="64" stroke="url(#grid-grad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- X Mark in Top-Left -->
  <path d="M 23 23 L 29 29 M 29 23 L 23 29" stroke="#00f2fe" stroke-width="3.5" stroke-linecap="round" filter="url(#glow-cyan)"/>
  
  <!-- O Mark in Center -->
  <circle cx="50" cy="50" r="4" fill="none" stroke="#f35588" stroke-width="3.5" filter="url(#glow-magenta)"/>
  
  <!-- Glowing Dot in Bottom-Right -->
  <circle cx="77" cy="77" r="1.5" fill="#00f2fe" opacity="0.8"/>
</svg>
